<!DOCTYPE html>
<html>
<head>
<title>Coins EMPERADOR</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
width:330px;
margin:auto;
margin-top:70px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
font-size:40px;
}

button{
background:#2563eb;
border:none;
padding:12px;
color:white;
border-radius:8px;
margin:6px;
width:230px;
font-size:16px;
}

.green{
background:#22c55e;
}

.gold{
background:#f59e0b;
}

.red{
background:#ef4444;
}

</style>

</head>

<body>

<div class="card">

<h2>👑 Coins EMPERADOR</h2>

<p id="user"></p>

<h1 id="coins">0</h1>

<button onclick="video()">🎥 Ver video +10</button>
<button onclick="follow()">👤 Seguir +20</button>
<button onclick="like()">❤️ Like +5</button>

<button class="green" onclick="bonus()">🎁 Bonus diario</button>

<button class="gold" onclick="ranking()">🏆 Ver ranking</button>

<button class="red" onclick="reset()">♻️ Reiniciar monedas</button>

</div>

<script>

let username = localStorage.getItem("user")

if(!username){

username = prompt("Escribe tu usuario")

localStorage.setItem("user",username)

}

document.getElementById("user").innerText = "Usuario: " + username

let coins = Number(localStorage.getItem("coins")) || 0

function update(){

localStorage.setItem("coins",coins)

document.getElementById("coins").innerText = coins

}

update()

function video(){

coins += 10
update()
alert("+10 monedas")

}

function follow(){

coins += 20
update()
alert("+20 monedas")

}

function like(){

coins += 5
update()
alert("+5 monedas")

}

function bonus(){

let last = localStorage.getItem("bonus")

let today = new Date().getDate()

if(last == today){

alert("Ya reclamaste el bonus hoy")

}else{

coins += 50

localStorage.setItem("bonus",today)

update()

alert("Bonus +50")

}

}

function ranking(){

alert("👤 Usuario: "+username+" | 💰 Monedas: "+coins)

}

function reset(){

if(confirm("¿Reiniciar monedas?")){

coins = 0
update()

}

}

</script>

</body>
</html>
