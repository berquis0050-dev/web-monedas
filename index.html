<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coins TITAN</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:30px;
border-radius:15px;
width:320px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
text-align:center;
}

h1{
font-size:40px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.blue{background:#3b82f6;}
.green{background:#22c55e;}
.gold{background:#f59e0b;}
.red{background:#ef4444;}

.rank{
margin-top:15px;
font-size:13px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="card">

<h2>👑 Coins TITAN</h2>

<p id="user"></p>

<h1 id="coins">0</h1>

<button class="blue" onclick="addCoins(10)">🎥 Ver video +10</button>

<button class="blue" onclick="addCoins(20)">👤 Seguir +20</button>

<button class="blue" onclick="addCoins(5)">❤️ Like +5</button>

<button class="green" onclick="dailyBonus()">🎁 Bonus diario</button>

<button class="gold" onclick="showRanking()">🏆 Ver ranking</button>

<button class="red" onclick="resetCoins()">♻ Reiniciar</button>

<div class="rank" id="ranking"></div>

</div>

<script>

let user = localStorage.getItem("user");
if(!user){
user = prompt("Escribe tu nombre");
localStorage.setItem("user",user);
}

document.getElementById("user").innerText = "Usuario: "+user;

let coins = parseInt(localStorage.getItem("coins")) || 0;
updateCoins();

function updateCoins(){
document.getElementById("coins").innerText = coins;
localStorage.setItem("coins",coins);
saveRanking();
}

function addCoins(amount){
coins += amount;
updateCoins();
}

function dailyBonus(){

let last = localStorage.getItem("bonusTime");
let now = Date.now();

if(!last || now - last > 86400000){

coins += 50;
localStorage.setItem("bonusTime",now);
updateCoins();
alert("🎁 Bonus diario +50 monedas");

}else{

alert("⏳ Ya reclamaste tu bonus hoy");

}

}

function resetCoins(){

if(confirm("¿Reiniciar monedas?")){
coins = 0;
updateCoins();
}

}

function saveRanking(){

let ranking = JSON.parse(localStorage.getItem("ranking")) || {};

ranking[user] = coins;

localStorage.setItem("ranking",JSON.stringify(ranking));

}

function showRanking(){

let ranking = JSON.parse(localStorage.getItem("ranking")) || {};

let sorted = Object.entries(ranking).sort((a,b)=>b[1]-a[1]);

let text = "🏆 Ranking\n\n";

sorted.slice(0,5).forEach((r,i)=>{
text += (i+1)+". "+r[0]+" - "+r[1]+" monedas\n";
});

alert(text);

}

</script>

</body>
</html>
